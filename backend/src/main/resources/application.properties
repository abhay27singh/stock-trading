spring.application.name=backend
server.port=9090

# Safety net: allow circular bean references (JwtFilter <-> SecurityConfig)
spring.main.allow-circular-references=true

# Database (values come from project-root .env; defaults let app boot locally)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/stocktrading_v2?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT (HMAC-SHA256 needs >= 32-byte secret)
jwt.secret=${JWT_SECRET:stocktrading_super_secret_key_2024_abhay_min_32_bytes}
jwt.expiration=${JWT_EXPIRATION:86400000}

# AlphaVantage
alphavantage.api.key=${ALPHAVANTAGE_API_KEY:demo}
alphavantage.base.url=${ALPHAVANTAGE_BASE_URL:https://www.alphavantage.co/query}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3001}

# Logging
logging.level.org.springframework.security=INFO
